<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MechNeuron</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: #0a0a0a;
            color: #f5f5f5;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            min-height: 100vh;
            padding: 2rem;
            opacity: 0;
            animation: fadeIn 1.2s ease-out forwards;
        }

        @keyframes fadeIn {
            to { opacity: 1; }
        }

        main {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            max-width: 600px;
            margin: 0 auto;
        }

        h1 {
            font-size: 2.8rem;
            font-weight: 700;
            letter-spacing: -0.03em;
            margin-bottom: 1.5rem;
            color: #ffffff;
        }

        p.description {
            font-size: 1.2rem;
            line-height: 1.65;
            color: #8e8e93;
            margin-bottom: 2.5rem;
        }

        p.description strong {
            color: #ffffff;
            font-weight: 500;
        }

        .status {
            display: inline-flex;
            align-items: center;
            font-size: 0.85rem;
            color: #8e8e93;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            font-weight: 600;
        }

        .status::before {
            content: "";
            display: inline-block;
            width: 8px;
            height: 8px;
            background-color: #30d158; /* Moderná zelená */
            border-radius: 50%;
            margin-right: 10px;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(48, 209, 88, 0.7); }
            70% { transform: scale(1); box-shadow: 0 0 0 6px rgba(48, 209, 88, 0); }
            100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(48, 209, 88, 0); }
        }

        footer {
            text-align: center;
            font-size: 0.8rem;
            color: #444446;
            padding-top: 2rem;
            letter-spacing: 0.02em;
        }
    </style>
</head>
<body>

    <main>
        <h1>MechNeuron</h1>
        <p class="description">
            Brand and project development in the fields of <strong>artificial intelligence</strong>, <strong>mechatronics</strong>, and <strong>neural systems</strong>.
        </p>
        <div class="status">Website under construction</div>
    </main>

    <footer>
        &copy; 2026 MechNeuron. All rights reserved.
    </footer>

</body>
</html>
